windows:
  shared_defaults:
    model_path: '${MODEL_DIR}'
    served_model_name: qwen3.6-27b-autoround
    quantization: auto-round
    kv_cache_dtype: fp8_e4m3
    attention_backend: TRITON_ATTN
    vllm_version: 0.19.0 SystemPanic wheel
    triton_backend: true
    max_num_seqs: 1
    max_num_batched_tokens: 4128
    block_size: 32
    enable_prefix_caching: true
    enable_chunked_prefill: true
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    reasoning_parser: qwen3
    trust_remote_code: true
    no_use_tqdm_on_load: true
    host: 0.0.0.0
    vision_disabled: true
    power_cap_w: 350
    bench_prompt_tokens: 24421
    bench_max_tokens: 200

  configs:
    - id: speed
      tagline: Speed king, peak decode
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_speed.bat'
      py:  '${SNAPSHOTS_DIR}\start_speed.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.948
      mtp_n: 6
      ctx: 90000
      port: 5001
      decode_tps: 64.5
      prefill_tps_cold: 965
      notes: |
        Peak decode config. MTP n=6 at ctx=90k is the sweet spot.
        Picked from sweep, see compatibility matrix and detail screen
        for full sweep.

        Also works on a single 3090 with display attached, as long as
        you close heavy GPU apps (Chrome, Discord, Slack, video playback)
        before launching. Once vLLM has reserved its KV pool you can
        reopen them, the driver schedules them around what vLLM
        already owns. If you can't or won't boot-quiet, use start_gpu0_50k
        instead.

    - id: ctx127k
      tagline: Max ctx single-GPU
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_127k.bat'
      py:  '${SNAPSHOTS_DIR}\start_127k.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.948
      mtp_n: 3
      ctx: 127000
      port: 5001
      decode_tps: 53.4
      prefill_tps_cold: 965
      notes: Largest single-GPU context. Trades decode speed for headroom.

    - id: mtp4
      tagline: Mid-balance ctx vs speed
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_mtp4.bat'
      py:  '${SNAPSHOTS_DIR}\start_mtp4.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.948
      mtp_n: 4
      ctx: 120000
      port: 5001
      decode_tps: 58.3
      prefill_tps_cold: 965
      notes: Compromise between speed and ctx headroom.

    - id: pp2_160k
      tagline: Both-GPU big-ctx, no spec-decode
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_pp2_160k.bat'
      py:  '${SNAPSHOTS_DIR}\start_pp2.py'
      gpu: GPU0+1
      tp: 1
      pp: 2
      mem_util: 0.92
      mtp_n: null
      ctx: 160000
      port: 5002
      decode_tps: 40.3
      prefill_tps_cold: 949
      notes: |
        PP=2 across both GPUs. No spec-decode (Qwen3NextMTP doesn't inherit SupportsPP).
        Best when you need >127k ctx.

    - id: gpu0_50k
      tagline: GPU0 conservative fallback
      tier: active
      status: conditional
      bat: '${SNAPSHOTS_DIR}\start_gpu0_50k.bat'
      py:  '${SNAPSHOTS_DIR}\start_gpu0_50k.py'
      gpu: GPU0
      tp: 1
      pp: 1
      mem_util: 0.92
      mtp_n: 6
      ctx: 50000
      port: 5001
      decode_tps: 56.9
      decode_tps_short: 75.1
      prefill_tps_cold: null
      notes: |
        Conservative fallback for single-3090-with-display when you
        can't or won't boot-quiet. Lower mem_util (0.92) leaves headroom
        for whatever the desktop / browser / video grabs after boot,
        at the cost of capping ctx near 50k.

        If you can close heavy GPU apps during boot, use start_speed
        instead, it serves the same 3090 with full 90k ctx and the
        same decode tok/s. Reopen the apps after vLLM finishes booting.

        Decode 56.9 tok/s on 24k prompt, 75.1 on 9k prompt.

    - id: instruct_general
      tagline: Instruct (non-thinking), general
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_instruct_general.bat'
      py:  '${SNAPSHOTS_DIR}\start_instruct_general.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.948
      mtp_n: 3
      ctx: 127000
      port: 5001
      decode_tps: 53.4
      prefill_tps_cold: 965
      notes: |
        Non-thinking mode for chat, Q&A, summarisation, general writing.
        Sampler defaults: temperature 0.7, top_p 0.8, top_k 20, min_p 0.0
        (Unsloth's recommended Instruct-general row). Thinking is
        disabled in the chat template so the model goes straight to the
        answer. Per-request sampler params still override these
        defaults. Same speed and context as ctx127k.

    - id: instruct_coding
      tagline: Instruct (non-thinking), coding
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_instruct_coding.bat'
      py:  '${SNAPSHOTS_DIR}\start_instruct_coding.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.948
      mtp_n: 3
      ctx: 127000
      port: 5001
      decode_tps: 53.4
      prefill_tps_cold: 965
      notes: |
        Non-thinking mode tuned for coding agents (Cline, Continue,
        Codex, Roo, Cursor). Sampler defaults: temperature 0.6,
        top_p 0.95, top_k 20, min_p 0.0 (Unsloth's recommended
        Instruct-coding row). Thinking disabled. Per-request sampler
        params still override.

    - id: thinking_coding
      tagline: Thinking, precise coding
      tier: active
      status: recommended
      bat: '${SNAPSHOTS_DIR}\start_thinking_coding.bat'
      py:  '${SNAPSHOTS_DIR}\start_thinking_coding.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.948
      mtp_n: 3
      ctx: 127000
      port: 5001
      decode_tps: 53.4
      prefill_tps_cold: 965
      notes: |
        Thinking mode with sampler tuned for code review, debugging,
        and architecture-level reasoning. Sampler defaults:
        temperature 0.6, top_p 0.95, top_k 20, min_p 0.0 (Unsloth's
        Thinking-precise-coding row). Thinking is left enabled so the
        model writes a <think> block before answering. Use when the
        reasoning trace adds value but you want tighter, code-friendly
        sampling than the thinking-mode default (temp 1.0).

    - id: ctx121k
      tagline: Legacy 250W max-ctx
      tier: legacy
      status: superseded
      bat: '${SNAPSHOTS_DIR}\start_121k.bat'
      py:  '${SNAPSHOTS_DIR}\start_121k.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.94
      mtp_n: 3
      ctx: 121000
      port: 5001
      decode_tps: 50.7
      prefill_tps_cold: 845
      power_cap_w: 250
      notes: Legacy 250W cap config. Superseded by ctx127k at 350W.

    - id: ctx120k
      tagline: Legacy ctx ladder
      tier: legacy
      status: superseded
      bat: '${SNAPSHOTS_DIR}\start_120k.bat'
      py:  '${SNAPSHOTS_DIR}\start_120k.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.94
      mtp_n: 3
      ctx: 120000
      port: 5001
      decode_tps: null
      prefill_tps_cold: null
      notes: Old ctx ladder rung.

    - id: ctx100k
      tagline: Legacy ctx ladder
      tier: legacy
      status: superseded
      bat: '${SNAPSHOTS_DIR}\start_100k.bat'
      py:  '${SNAPSHOTS_DIR}\start_100k.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.94
      mtp_n: 3
      ctx: 100000
      port: 5001
      decode_tps: null
      prefill_tps_cold: null
      notes: Old ctx ladder rung.

    - id: ctx64k
      tagline: Legacy ctx ladder
      tier: legacy
      status: superseded
      bat: '${SNAPSHOTS_DIR}\start_64k.bat'
      py:  '${SNAPSHOTS_DIR}\start_64k.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.94
      mtp_n: 3
      ctx: 64000
      port: 5001
      decode_tps: null
      prefill_tps_cold: null
      notes: Old ctx ladder rung.

    - id: baseline72
      tagline: Original 250W baseline
      tier: legacy
      status: superseded
      bat: '${SNAPSHOTS_DIR}\start_72tps.bat'
      py:  '${SNAPSHOTS_DIR}\start.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.92
      mtp_n: 3
      ctx: 32000
      port: 5001
      decode_tps_long: 50
      decode_tps_short: 72.5
      power_cap_w: 250
      notes: Original 250W baseline. ~50 tok/s on 24k prompt; 72.5 on short prompts.

    - id: draft
      tagline: BLOCKED — no vocab=248320 drafter
      tier: blocked
      status: blocked
      bat: '${SNAPSHOTS_DIR}\start_draft.bat'
      py:  '${SNAPSHOTS_DIR}\start_draft.py'
      gpu: GPU1
      tp: 1
      pp: 1
      mem_util: 0.92
      draft_model_n: 5
      ctx: 32000
      port: 5003
      decode_tps: null
      prefill_tps_cold: null
      notes: |
        Draft-model speculative decode. BLOCKED — no compatible drafter
        with vocab_size=248320 exists for Qwen3.6-27B-int4-AutoRound.

  mtp_sweep:
    description: MTP n × ctx sweep on speed config (GPU1, mem=0.948, 350W)
    rows:
      - { mtp_n: 3, ctx: 121000, decode_tps: 50.7 }
      - { mtp_n: 3, ctx: 127000, decode_tps: 53.4 }
      - { mtp_n: 4, ctx: 120000, decode_tps: 58.3 }
      - { mtp_n: 5, ctx: 110000, decode_tps: 62.8 }
      - { mtp_n: 6, ctx: 90000,  decode_tps: 64.5, peak: true }
      - { mtp_n: 6, ctx: 100000, decode_tps: 64.4 }
      - { mtp_n: 6, ctx: 112000, decode_tps: 60.4 }
      - { mtp_n: 7, ctx: 90000,  decode_tps: 61.5 }
      - { mtp_n: 8, ctx: 90000,  decode_tps: 58.0 }

  compatibility_matrix:
    - { combo: 'TP=1 + MTP',           status: ok,      note: 'Works — production path' }
    - { combo: 'TP=1 + draft-model',   status: blocked, note: 'No compatible drafter (vocab=248320)' }
    - { combo: 'PP=2 + MTP',           status: bad,     note: 'Qwen3NextMTP does not inherit SupportsPP' }
    - { combo: 'PP=2 + ngram',         status: warn,    note: 'Boots, asserts on first request' }
    - { combo: 'PP=2 + no spec-decode', status: ok,     note: 'pp2_160k path' }
    - { combo: 'TP=2 (any)',           status: warn,    note: '~7.5 tok/s, unusable' }


